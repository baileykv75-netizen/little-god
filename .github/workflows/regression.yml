name: Checkpoint regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: little-god-regression-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ROUND51_WORKERS: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax checks
        run: |
          node --check src/genesis/terrain-store-v2.js
          node --check src/genesis/rng-v1.js
          node --check src/genesis/experiment-telemetry-v1.js
          node --check src/genesis/simulation.js
          node --check src/genesis/ecology-stability-v1.js
          node --check src/genesis/hunter-mate-seeking-v1.js
          node --check src/genesis/ecology-rebalance-v1.js
          node --check src/genesis/group-quality-v1.js
          node --check src/genesis/experiment-provenance-v1.js
          node --check src/genesis/diagnostics.js
          node --check src/genesis/active-traits-v1.js
          node --check src/genesis/group-behavior-v1.js
          node --check src/genesis/pack-hunting-v1.js
          node --check src/genesis/group-observer-v1.js
          node --check src/genesis/kinship-v1.js
          node --check src/genesis/speciation-v1.js
          node --check src/genesis/ecotype-observer-v1.js
          node --check src/genesis/arcane-bloodline-v1.js
          node --check src/genesis/bloodline-observer-v1.js
          node --check src/genesis/terrain-diagnostics-contract.js
          node --check src/genesis/terrain-renderer-v2.js
          node --check tools/run-long-ecology.cjs
          node --check tools/run-long-ecology-parallel.cjs
          node --check tests/group-quality.test.cjs
          node --check tests/pack-hunting.test.cjs
          node --check tests/experiment-provenance.test.cjs
          node --check tests/long-run-tool.test.cjs
      - name: Checkpoint regression tests
        run: |
          node tests/static-assets.test.cjs
          node tests/vegetation-grid.test.cjs
          node tests/terrain-diagnostics-contract.test.cjs
          node tests/terrain-feeding-v2.test.cjs
          node tests/terrain-renderer.test.cjs
          node tests/seeded-rng.test.cjs
          node tests/experiment-telemetry.test.cjs
          node tests/experiment-seed-controls.test.cjs
          node tests/ecology-stability.test.cjs
          node tests/compact-diagnostics.test.cjs
          node tests/hunter-mate-seeking.test.cjs
          node tests/ecology-rebalance.test.cjs
          node tests/active-traits.test.cjs
          node tests/group-behavior.test.cjs
          node tests/group-observer.test.cjs
          node tests/group-quality.test.cjs
          node tests/pack-hunting.test.cjs
          node tests/experiment-provenance.test.cjs
          node tests/kinship.test.cjs
          node tests/speciation.test.cjs
          node tests/ecotype-observer.test.cjs
          node tests/arcane-bloodline.test.cjs
          node tests/bloodline-observer.test.cjs
          node tests/long-run-tool.test.cjs
      - name: Deterministic 60-year baseline and replay
        run: |
          rm -rf artifacts/round51
          node tools/run-long-ecology-parallel.cjs \
            --years 60 \
            --seeds-per-scenario 2 \
            --step-years 0.001875 \
            --output-dir artifacts/round51
          node -e 'const fs=require("fs"); const c=JSON.parse(fs.readFileSync("artifacts/round51/comparison.json")); if(!c.ecologyBehaviorUnchanged) process.exit(1);'
      - name: Upload Round 51 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: round51-long-run-evidence
          if-no-files-found: warn
          path: |
            LONG_RUN_FINDINGS.md
            artifacts/round51/*.json
      - name: Commit generated long-run evidence
        if: success() && github.event_name == 'push' && github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add LONG_RUN_FINDINGS.md artifacts/round51/baseline.json artifacts/round51/post.json artifacts/round51/comparison.json
          if ! git diff --cached --quiet; then
            git commit -m "Record Round 51 long-run findings [skip ci]"
            git push
          fi
